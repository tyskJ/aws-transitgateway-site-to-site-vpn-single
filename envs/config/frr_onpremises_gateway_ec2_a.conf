! ==================================================
! FRR Basic Settings
! ==================================================

frr defaults traditional
! FRRのCLIを従来型ルータスタイルにする
! → Cisco系と似た操作性にするため

hostname ec2-active
! ルータの識別名（ログ・CLI表示用）

log syslog informational
! ログ出力先 : syslog
! informational = 通常運用ログレベル

service integrated-vtysh-config
! FRRの設定をvtyshで一元管理
! → 複数デーモン(BGP等)の設定を1ファイルで管理


! ==================================================
! BGP Configuration
! ==================================================
! BGP = Border Gateway Protocol
! 異なるネットワーク(AS)間で経路情報を交換するプロトコル
!
! AS = Autonomous System
! ネットワークの管理単位
!
! Neighbor = BGPピア(接続相手ルータ)
!
! AF = Address Family
! 扱うルーティング種類
! 例: ipv4 unicast = 通常のIPv4通信

router bgp ${cgw_asn}
! EC2側AS番号

 bgp router-id ${cgw_gip}
 ! BGPルータ識別ID
 ! 通常は安定したIPを使用

 bgp log-neighbor-changes
 ! BGPピア状態変化をログ出力
 ! → VPN断などの検知のため

 no bgp ebgp-requires-policy
 ! eBGPでもポリシー無しで経路交換を許可
 ! → AWS VPN構成ではシンプルにするため

 no bgp default ipv4-unicast
 no bgp default ipv6-unicast
 ! AFを明示設定にする
 ! → 不要な経路交換防止

 bgp graceful-restart
 ! ルータ再起動時の通信断を最小化

 timers bgp 10 30
 ! BGPタイマー
 ! keepalive : 10秒
 ! holdtime  : 30秒
 ! → VPN障害を早期検知


! ==================================================
! AWS VPN Tunnel #1
! ==================================================

 neighbor ${awsside_tunnel1_insideip} remote-as ${aws_tgw_asn}
 ! AWS側ピアInsideIP & ASN

 neighbor ${awsside_tunnel1_insideip} update-source ${cgwside_tunnel1_insideip}
 ! BGP通信の送信元IP
 ! → VPNトンネルIP

 neighbor ${awsside_tunnel1_insideip} description AWS-VPN-Tunnel-1
 ! 管理用説明

 neighbor ${awsside_tunnel1_insideip} timers 10 30
 ! BGPタイマー

 neighbor ${awsside_tunnel1_insideip} timers connect 10
 ! 接続失敗時の再試行間隔


! ==================================================
! AWS VPN Tunnel #2 (冗長トンネル)
! ==================================================

 neighbor ${awsside_tunnel2_insideip} remote-as ${aws_tgw_asn}

 neighbor ${awsside_tunnel2_insideip} update-source ${cgwside_tunnel2_insideip}

 neighbor ${awsside_tunnel2_insideip} description AWS-VPN-Tunnel-2

 neighbor ${awsside_tunnel2_insideip} timers 10 30

 neighbor ${awsside_tunnel2_insideip} timers connect 10


! ==================================================
! Address Family : IPv4
! ==================================================

 address-family ipv4 unicast
 ! IPv4ユニキャストルーティング

  network ${onpremises_nw_cidr}
  ! EC2背後ネットワークをAWSへ広告

  !
  ! Tunnel1
  !
  neighbor ${awsside_tunnel1_insideip} activate
  ! IPv4 AFでピアを有効化

  neighbor ${awsside_tunnel1_insideip} soft-reconfiguration inbound
  ! 受信経路を保持
  ! → ポリシー変更時に再接続不要

  neighbor ${awsside_tunnel1_insideip} route-map FROM-AWS in
  ! AWSから受信する経路ポリシー

  neighbor ${awsside_tunnel1_insideip} prefix-list ADVERTISE-TO-AWS out
  ! AWSへ広告する経路制御


  !
  ! Tunnel2
  !
  neighbor ${awsside_tunnel2_insideip} activate

  neighbor ${awsside_tunnel2_insideip} soft-reconfiguration inbound

  neighbor ${awsside_tunnel2_insideip} route-map FROM-AWS in

  neighbor ${awsside_tunnel2_insideip} prefix-list ADVERTISE-TO-AWS out

 exit-address-family
exit


! ==================================================
! Static Route (Summary Route)
! ==================================================
! BGP networkは
! ルーティングテーブル(RIB)に存在しないと広告できない

ip route ${onpremises_nw_cidr} Null0
! Null0 = ブラックホールインターフェース
! 実通信ではなく「経路存在だけ保証」
! → サマリルート広告用


! ==================================================
! Prefix List (Outbound Filter)
! ==================================================
! prefix-list = IPプレフィックス単位の経路フィルタ

ip prefix-list ADVERTISE-TO-AWS seq 10 permit ${onpremises_nw_cidr}
! EC2背後ネットワークのみ広告

ip prefix-list ADVERTISE-TO-AWS seq 100 deny 0.0.0.0/0 le 32
! その他すべて拒否
! → AWSから受信した経路を再広告しない


! ==================================================
! Route Map (Inbound Policy)
! ==================================================
! route-map = ルーティングポリシー
! prefix-list等を組み合わせて経路制御

route-map FROM-AWS permit 10
! AWSからの経路を許可
! 必要ならここで受信フィルタ可能

exit


! ==================================================
! VTY (CLI Access)
! ==================================================

line vty
 exec-timeout 0 0
 ! CLIセッションタイムアウト無し
 ! → 運用中の接続を切らない

exit